name: Daily German Word Scrape

on:
  schedule:
    - cron: "0 5 * * *" # 07:00 Cairo (UTC+2) = 05:00 UTC
  workflow_dispatch: # allow manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to push the CSV commit back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python src/main.py

      - name: Commit & push new CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/
          git diff --staged --quiet || git commit -m "chore: daily German words $(date +%Y-%m-%d)"
          git push
